# Production compose for BidloBot.
#
# One bot replica plus an internal renderer sidecar. Telegram allows exactly
# one getUpdates poller per token, so the bot cannot scale horizontally
# without a webhook front-door. `restart: unless-stopped` plus the 30s
# stop grace period leave time for the Go process to shut down cleanly.
#
# No `ports:` mapping. The host already has 8080 and 8081 occupied by
# unrelated services (verified before deploy). The healthcheck reaches
# the listener over the container's own loopback, so no host port is
# needed - `docker inspect bidlobot` and `docker exec bidlobot wget ...`
# remain available for operator debugging.
#
# Resource limits track the systemd MemoryMax/TasksMax from the bare
# install path. CPU at 0.5 leaves the host responsive even if a runaway
# loop appears; a moderation bot is wildly idle in normal operation.

name: bidlobot

services:
  bot:
    build:
      context: .
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-unknown}
    image: bidlobot:${VERSION:-latest}
    container_name: bidlobot
    restart: unless-stopped
    env_file:
      # The deployment env file carries Telegram and Pi provider variables.
      # Compose passes them directly to the unprivileged bot process; no
      # host credential directory is mounted into the image.
      - ./env
    environment:
      - DEEPSEEK_API_KEY
    volumes:
      - bidlobot-data:/var/lib/bidlobot
    # 30s = App.ShutdownTimeout (10s for handler) + 10s for in-flight
    # WaitGroup + 10s slack for bbolt close. The systemd-era 15s was
    # too tight: a cleanup worker mid-kick can hit retry budgets that
    # individually take >10s, and we want bbolt.Close to land cleanly.
    stop_grace_period: 30s
    init: false # tini already runs as PID 1 inside the image
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 60s
      retries: 3
    depends_on:
      xshot:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  xshot:
    build:
      context: ./xshot
    image: bidlobot-xshot:${VERSION:-latest}
    container_name: bidlobot-xshot
    restart: unless-stopped
    environment:
      - PORT=3210
      - WATERMARK_ENABLED=false
    expose:
      - "3210"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3210/api/config').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

volumes:
  bidlobot-data:
    name: bidlobot-data
