# CI for the BidloBot Go module.
#
# Runs on every push and PR targeting master. Three concerns:
#
#   1. correctness  -- vet + test -race + build
#   2. deploy posture -- docker buildx build (no push) so a Dockerfile
#      regression bites CI, not the deploy host
#   3. secret hygiene -- gitleaks scan, since the repo is public and
#      one accidental .env commit becomes a permanent leak
#
# Actions are pinned to floating major tags (v4 / v5). When the
# project starts shipping signed releases or accepts external PRs,
# pin to commit SHAs instead.
name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: vet + race + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks needs full history

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test -race -cover
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: go build
        run: go build ./...

      - name: upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.out
          retention-days: 7

  docker:
    name: docker build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup buildx
        uses: docker/setup-buildx-action@v3

      - name: build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: bidlobot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}-${{ github.sha }}
            COMMIT=${{ github.sha }}

      - name: smoke test image
        run: |
          docker run --rm bidlobot:ci --version
          docker run --rm -e TG_BOT_TOKEN= bidlobot:ci --check-config && exit 1 || true
          docker run --rm -e TG_BOT_TOKEN=123456789:ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghi bidlobot:ci --check-config

  secret-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
